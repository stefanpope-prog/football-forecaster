<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
  <title>Forecaster</title>
</head>
<body>
<div class="container">
  <header>
    <h1>Forecaster</h1>
    <div class="meta">Updated 2026-07-24 12:24 UTC · Model accuracy: -</div>
  </header>

  

  
</div>

<script type="application/json" id="briefings">{}</script>
<script>
function copyAndOpen(btn) {
  const id = btn.dataset.fixture;
  const briefings = JSON.parse(document.getElementById('briefings').textContent);
  const text = briefings[id];
  if (!text) return;

  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  ta.setSelectionRange(0, text.length);
  let copied = false;
  try { copied = document.execCommand('copy'); } catch (e) {}
  ta.remove();

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => {});
  }

  btn.textContent = copied ? "Copied - opening Claude..." : "Opening Claude...";
  window.open('https://claude.ai/new', '_blank');
}
</script>
</body>
</html>
